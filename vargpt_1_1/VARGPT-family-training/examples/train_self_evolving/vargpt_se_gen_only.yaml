### VARGPT Self-Evolving: Generation-Only (0U+5G)
### Ablation: only generation steps, no understanding steps.
### Tests whether generation-only training improves image quality.

### model
model_name_or_path: VARGPT-family/VARGPT-v1.1

### method
stage: self_evolving
do_train: true
finetuning_type: lora
vargpt_version: "qwen2vl-v1.1"
flash_attn: disabled

### lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset
template: vargpt_qwen2_vl
cutoff_len: 2048

### output
output_dir: saves/vargpt_v1_1_se_gen_only_0U5G

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-6
weight_decay: 0.01
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### self-evolving config
se_understanding_steps_per_cycle: 0
se_generation_steps_per_cycle: 5
se_total_steps: 10000
se_save_every: 200
se_replay_buffer_size: 1
se_gen_mix_ratio_max: 0.0
se_imageless_proposer_mode: true
se_gen_reward_mode: clip
se_num_generations: 3
se_lr: 1.0e-6
se_reward_spec_weight: 0.65
se_reward_cycle_weight: 0.20
se_reward_diversity_weight: 0.10
se_reward_contradiction_weight: 0.20
se_min_spec_quality_for_update: 0.35
se_min_spec_qa_pairs: 2
se_max_expected_words: 8
se_max_question_words: 24
se_use_ref_answer_scoring: false
se_proposer_gen_reward_enabled: true
se_num_solver_samples: 7
se_proposer_num_candidates: 3
se_proposer_spot_check_samples: 3
se_proposer_question_quality_min_score: 0.60
se_proposer_question_structural_min_score: 0.50
se_proposer_question_model_judge_enabled: true
se_proposer_question_model_judge_weight: 0.15
se_solver_use_temperature_mix: true
se_solver_use_forced_choice_from_proposer: true
se_solver_temp_min: 0.5
se_solver_temp_max: 2.5
se_solver_top_p_min: 0.3
se_solver_top_p_max: 1.0
se_solver_skip_update_on_easy: true
se_easy_update_majority_frac_threshold: 0.85
se_difficulty_sampler_enabled: true
se_difficulty_sampler_min_samples: 8
se_difficulty_target_easy: 0.0
se_difficulty_target_medium: 0.7
se_difficulty_target_hard: 0.3
se_proposer_warm_start_enabled: true
se_proposer_warm_start_max_steps: 30
se_proposer_warm_start_exit_window: 5
se_proposer_warm_start_exit_consecutive: 2
se_proposer_warm_start_entropy_exit_threshold: 0.1
se_hardness_debt_enabled: true
se_hardness_debt_inc_easy: 1.5
se_hardness_debt_dec_non_easy: 1.0
se_hardness_debt_hard_recovery_threshold: 3.0
se_all_easy_explore_trigger: 2
se_all_easy_explore_steps: 16
se_all_easy_explore_num_candidates: 6
se_proposer_early_failfast_enabled: true
se_proposer_early_failfast_stop: false
se_proposer_early_failfast_recover: true

### logging
logging_steps: 10
save_steps: 200
plot_loss: true
